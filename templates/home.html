{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="padding: 60px; text-align: center; margin-top: 20px;">
    <h1 class="hero-title">
        Download YouTube<br>
        <span style="color: var(--accent-color);">In Style.</span>
    </h1>
    <p class="hero-subtext">
        Experience the most beautiful way to manage and download your favorite content.
        Sleek, fast, and wrapped in glass.
    </p>

    <a href="{% url 'video_list' %}" class="glass-btn primary" style="font-size: 1.2rem; padding: 15px 40px;">
        <i class="fas fa-search"></i> Explore Library
    </a>

    <div class="feature-row">
        <div class="feature">
            <i class="fas fa-layer-group" style="font-size: 2rem; color: var(--accent-color); margin-bottom: 15px;"></i>
            <h3>Batch Select</h3>
        </div>
        <div class="feature">
            <i class="fas fa-cut" style="font-size: 2rem; color: #00d2ff; margin-bottom: 15px;"></i>
            <h3>Smart Trim</h3>
        </div>
        <div class="feature">
            <i class="fas fa-images" style="font-size: 2rem; color: #7b2cbf; margin-bottom: 15px;"></i>
            <h3>High-Res Meta</h3>
        </div>
    </div>
</div>
{% endblock %}
