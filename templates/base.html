{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Listening Practice{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}">
</head>
<body class="site-page{% if request.resolver_match.url_name == 'landing' %} site-page--landing{% endif %}">
  {% include 'includes/navbar.html' %}
  <main class="{% if request.resolver_match.url_name == 'landing' %}site-main site-main--landing{% else %}site-main container py-4{% endif %}">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer {% if request.resolver_match.url_name == 'landing' %}site-footer--dark{% else %}site-footer--light{% endif %}" aria-label="Site footer">
    <div class="site-footer__inner">
      <div class="site-footer__avatar-wrap">
        <img
          class="site-footer__avatar"
          src="{% static 'img/owner.jpg' %}"
          alt="Ahading owner portrait"
          loading="lazy"
          width="44"
          height="44"
        >
      </div>
      <p class="site-footer__text">Powered by Ahading &middot; 아름다운 한글 코딩 &middot; Since 2009.2</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
