<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ movie_title }} · anglangl</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #f8fafc;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      overflow: hidden;
    }
    .player-header {
      position: fixed;
      inset: 0 0 auto;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: linear-gradient(180deg, rgba(4, 9, 18, .96), rgba(4, 9, 18, .52), transparent);
      transition: opacity .18s ease;
    }
    .player-back {
      display: inline-flex;
      width: 3rem;
      height: 3rem;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .player-title {
      min-width: 0;
      flex: 1;
    }
    .player-title h1 {
      overflow: hidden;
      margin: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1rem, 3vw, 1.5rem);
    }
    .player-title p {
      margin: .25rem 0 0;
      color: rgba(248, 250, 252, .68);
      font-size: .85rem;
      font-weight: 700;
    }
    .player-frame-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #000;
    }
    .player-frame {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .player-loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05070d;
      text-align: center;
    }
    .player-loading.hidden,
    .player-hint.hidden {
      display: none;
    }
    .spinner {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1rem;
      border: .3rem solid rgba(255, 255, 255, .14);
      border-top-color: #22c55e;
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }
    .player-hint {
      position: fixed;
      left: 50%;
      bottom: 1.25rem;
      z-index: 30;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #f8fafc;
      color: #07111f;
      padding: .55rem .9rem;
      font-size: .9rem;
      font-weight: 800;
      transition: opacity .2s ease;
    }
    .opacity-0 {
      opacity: 0;
      pointer-events: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header id="playerHeader" class="player-header">
    <button type="button" class="player-back" onclick="goBack()" aria-label="이전 화면으로">←</button>
    <div class="player-title">
      <h1>{{ movie_title }}</h1>
      <p>TMDB ID {{ tmdb_id }}</p>
    </div>
  </header>

  <div class="player-frame-wrap">
    <iframe id="videoFrame"
            class="player-frame"
            src="{{ player_url }}"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            onload="hidePlayerLoading()">
    </iframe>
  </div>

  <div id="playerLoading" class="player-loading">
    <div>
      <div class="spinner"></div>
      <p>영화를 불러오는 중...</p>
    </div>
  </div>
  <div id="playerHint" class="player-hint">마우스를 움직이면 컨트롤이 나타납니다</div>

  <script>
  let playerHeaderTimer = null;
  function goBack() {
    window.history.back();
  }
  function hidePlayerLoading() {
    const loading = document.getElementById('playerLoading');
    if (loading) loading.classList.add('hidden');
  }
  function showHeaderTemporarily() {
    const header = document.getElementById('playerHeader');
    if (!header) return;
    header.classList.remove('opacity-0');
    clearTimeout(playerHeaderTimer);
    playerHeaderTimer = setTimeout(() => header.classList.add('opacity-0'), 3000);
  }
  document.addEventListener('mousemove', showHeaderTemporarily);
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') goBack();
  });
  document.addEventListener('DOMContentLoaded', () => {
    showHeaderTemporarily();
    setTimeout(() => {
      const hint = document.getElementById('playerHint');
      if (hint) hint.classList.add('opacity-0');
    }, 3000);
    setTimeout(hidePlayerLoading, 8000);
  });
  </script>
</body>
</html>
