{% extends 'base.html' %}

{% block title %}ThePeach Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h1 class="h4 mb-3">ThePeach Login</h1>
        <p class="text-muted">로그인은 ThePeach에서 검증하고, anglangl은 필요한 로컬 사용자만 동기화합니다.</p>
        {% if suggest_signup %}
          <div class="alert alert-warning">
            계정이 없다면 먼저 가입하세요.
            <a href="{% url 'platform_auth:signup' %}{% if next %}?next={{ next|urlencode }}{% endif %}">ThePeach 계정 만들기</a>
          </div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Login with ThePeach</button>
          <a class="btn btn-outline-secondary" href="{% url 'platform_auth:signup' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Sign up</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
