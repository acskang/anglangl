{% extends 'base.html' %}

{% block title %}Delete Clip{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body">
        <h1 class="h4 text-danger">Delete Clip</h1>
        <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Delete</button>
          <a href="{% url 'clips:detail' object.id %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
